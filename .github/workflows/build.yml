name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Typecheck & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Engine unit tests (drilling formulas)
        run: npm test

  android:
    name: Android APK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install dependencies
        run: npm ci
      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install
      - name: Build release APK
        run: cd android && ./gradlew assembleRelease --no-daemon
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DrillCalc-android
          path: android/app/build/outputs/apk/release/*.apk

  ios:
    name: iOS app (unsigned)
    needs: test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Select latest Xcode (Swift 6.2+ needed by Expo SDK 56)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install dependencies
        run: npm ci
      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --no-install
      - name: Install pods
        run: cd ios && pod install
      - name: Build (no code signing)
        run: |
          cd ios
          xcodebuild \
            -workspace DrillCalc.xcworkspace \
            -scheme DrillCalc \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -R ios/build/Build/Products/Release-iphoneos/DrillCalc.app Payload/
          zip -ry DrillCalc-unsigned.ipa Payload
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: DrillCalc-ios-unsigned
          path: DrillCalc-unsigned.ipa
